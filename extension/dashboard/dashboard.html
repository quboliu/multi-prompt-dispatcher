<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-LLM Command Center</title>
    <link rel="stylesheet" href="dashboard.css">
</head>

<body>
    <div id="app-container" class="sidebar-left">
        <!-- 侧边栏 -->
        <aside id="sidebar">
            <div class="sidebar-section settings-section">
                <h3>Settings</h3>
                <div class="setting-item">
                    <label>Position:</label>
                    <select id="sidebarPosSelect">
                        <option value="left" selected>Left</option>
                        <option value="right">Right</option>
                        <option value="top">Top</option>
                        <option value="bottom">Bottom</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>Card Width (px):</label>
                    <input type="number" id="cardWidthInput" placeholder="Auto" min="200" step="10">
                </div>
                <div class="setting-item">
                    <label>Card Height (px):</label>
                    <input type="number" id="cardHeightInput" placeholder="Half Screen" min="200" step="10">
                </div>
            </div>

            <div class="sidebar-section input-section">
                <h3>Prompt Input</h3>
                <textarea id="sidebarPromptInput" placeholder="Enter your prompt here..."></textarea>
                <div class="input-actions">
                    <button id="sidebarSendBtn" class="primary-btn">Send to Selected</button>
                    <div class="selection-info">
                        <label><input type="checkbox" id="selectAllCheckbox"> Select All</label>
                    </div>
                </div>
            </div>

            <div class="sidebar-section history-section">
                <h3>History</h3>
                <div id="historyList" class="history-list">
                    <!-- History items will be injected here -->
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="dashboard-container">
                <!-- 顶部控制栏 -->
                <header class="control-bar">
                    <div class="logo-section">
                        <span class="logo-icon">🎛️</span>
                        <h1>Command Center</h1>
                    </div>

                    <div class="controls">
                        <!-- 分组控制 -->
                        <div class="control-group">
                            <label>[GROUP BY MODEL]</label>
                            <input type="checkbox" id="groupToggle">
                        </div>

                        <!-- 布局选择 -->
                        <div class="layout-selector">
                            <label>[LAYOUT]</label>
                            <select id="layoutSelect">
                                <option value="1">nx1</option>
                                <option value="2" selected>nx2</option>
                                <option value="3">nx3</option>
                                <option value="4">nx4</option>
                            </select>
                        </div>

                        <!-- 刷新 -->
                        <button id="refreshBtn" class="control-btn"></button>

                        <!-- 全屏 -->
                        <button id="fullscreenBtn" class="control-btn"></button>
                    </div>
                </header>

                <!-- Grid 容器 -->
                <div id="gridContainer" class="grid-container">
                    <!-- 将由 JS 动态填充 -->
                </div>

                <!-- 空状态 -->
                <div id="emptyState" class="empty-state">
                    <h2>[ NO ACTIVE MODELS ]</h2>
                    <p>Please open ChatGPT, Claude, or Gemini tabs.</p>
                </div>
            </div>
        </main>
    </div>

    <script src="dashboard.js"></script>
</body>

</html>
