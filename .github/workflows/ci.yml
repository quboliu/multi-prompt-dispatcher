# CI gate for the unpacked Chromium extension. It stays intentionally lean:
# docs-only changes do not spend a runner, superseded pushes are cancelled, and
# the packaged extension zip is uploaded as a short-lived artifact for review.
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "README.zh-CN.md"
      - "LICENSE"
      - "docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "README.zh-CN.md"
      - "LICENSE"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate extension package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate manifest and referenced files
        run: node scripts/validate-extension.mjs
      - name: JavaScript syntax check
        run: |
          find extension scripts -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Build extension zip
        run: bash scripts/package-extension.sh
      - name: Verify checksum
        run: |
          cd dist
          sha256sum -c *.sha256
      - name: Upload extension package
        uses: actions/upload-artifact@v4
        with:
          name: extension-package
          path: |
            dist/*.zip
            dist/*.sha256
          retention-days: 14
